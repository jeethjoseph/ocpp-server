# Cap each container's log file growth. 5 × 50 MB = 250 MB max per container
# before the oldest file rotates out. `docker logs` still reads across the
# rotated files transparently. Referenced from every service below.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ocpp-postgres-staging
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ocpp-network-staging
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ocpp-redis-staging
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ocpp-network-staging
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ocpp-backend-staging
    environment:
      - ENVIRONMENT=staging
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - CLERK_JWKS_URL=${CLERK_JWKS_URL:-}
      - CLERK_ISSUER=${CLERK_ISSUER:-}
      # Database & Redis
      # DB_HOST defaults to 'postgres' (Docker network name) for pre-RDS-migration.
      # At cutover, .env.staging overrides this with the RDS endpoint hostname
      # and DB_SSL_MODE flips to verify-full. See backend/db_ssl.py for the
      # SSL contract; the CA bundle is baked into the backend image at build time.
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSL_MODE=${DB_SSL_MODE:-}
      - REDIS_URL=redis://redis:6379
      # Server
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=${WORKERS:-2}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Clerk Authentication
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-https://${DOMAIN_NAME}}
      # Razorpay Payments
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      # Razorpay Route (franchisee linked-account payouts)
      - RAZORPAY_ROUTE_ENABLED=${RAZORPAY_ROUTE_ENABLED:-false}
      - WALLET_SETTLEMENT_ENABLED=${WALLET_SETTLEMENT_ENABLED:-false}
      - MINIMUM_TRANSFER_AMOUNT=${MINIMUM_TRANSFER_AMOUNT:-1.00}
      - MAX_TRANSFER_RETRIES=${MAX_TRANSFER_RETRIES:-3}
      - FRANCHISEE_PAYOUT_RETRY_INTERVAL_SECONDS=${FRANCHISEE_PAYOUT_RETRY_INTERVAL_SECONDS:-600}
      - STUCK_PAYOUT_CHECK_INTERVAL_SECONDS=${STUCK_PAYOUT_CHECK_INTERVAL_SECONDS:-3600}
      - STUCK_PAYOUT_THRESHOLD_HOURS=${STUCK_PAYOUT_THRESHOLD_HOURS:-24}
      # VoltLync GST supplier identity (printed on every invoice)
      - VOLTLYNC_BUSINESS_NAME=${VOLTLYNC_BUSINESS_NAME:-VOLTLYNC PRIVATE LIMITED}
      - VOLTLYNC_GSTIN=${VOLTLYNC_GSTIN:-}
      - VOLTLYNC_ADDRESS=${VOLTLYNC_ADDRESS:-}
      - VOLTLYNC_STATE=${VOLTLYNC_STATE:-Kerala}
      - VOLTLYNC_STATE_CODE=${VOLTLYNC_STATE_CODE:-32}
      # Invoice PDF persistence (S3, lazy upload)
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_S3_INVOICE_BUCKET=${AWS_S3_INVOICE_BUCKET:-}
      # Firmware update (S3 storage + retry scheduler)
      - AWS_S3_FIRMWARE_BUCKET=${AWS_S3_FIRMWARE_BUCKET:-}
      - FIRMWARE_PUBLIC_BASE_URL=${FIRMWARE_PUBLIC_BASE_URL:-https://staging.voltlync.com}
      - FIRMWARE_MAX_ATTEMPTS=${FIRMWARE_MAX_ATTEMPTS:-5}
      - FIRMWARE_MAX_ELAPSED_SECONDS=${FIRMWARE_MAX_ELAPSED_SECONDS:-21600}
      - FIRMWARE_ATTEMPT_TIMEOUT_SECONDS=${FIRMWARE_ATTEMPT_TIMEOUT_SECONDS:-7200}
      - FIRMWARE_BOOT_DEBOUNCE_SECONDS=${FIRMWARE_BOOT_DEBOUNCE_SECONDS:-300}
      # QR Payment Tuning
      - RAZORPAY_PLATFORM_FEE_PERCENT=${RAZORPAY_PLATFORM_FEE_PERCENT:-2.0}
      - MINIMUM_REFUND_AMOUNT=${MINIMUM_REFUND_AMOUNT:-1.0}
      - QR_PAYMENT_PENDING_TIMEOUT=${QR_PAYMENT_PENDING_TIMEOUT:-300}
      # Razorpay instant refund kill-switch (ADR 0002). Default true.
      # Flip to false to revert to normal speed in an incident.
      - RAZORPAY_INSTANT_REFUND_ENABLED=${RAZORPAY_INSTANT_REFUND_ENABLED:-true}
      # OCPP & Server Tuning
      - DISCONNECT_SUSPEND_TIMEOUT_SECONDS=${DISCONNECT_SUSPEND_TIMEOUT_SECONDS:-180}
      - SUSPEND_TIMEOUT_SECONDS=${SUSPEND_TIMEOUT_SECONDS:-300}
      - SOCKET_GRACE_PERIOD_SECONDS=${SOCKET_GRACE_PERIOD_SECONDS:-300}
      - ZERO_ENERGY_TIMEOUT_SECONDS=${ZERO_ENERGY_TIMEOUT_SECONDS:-7200}
      - ZERO_ENERGY_GRACE_PERIOD_SECONDS=${ZERO_ENERGY_GRACE_PERIOD_SECONDS:-60}
      - OCPP_TIMEOUT=${OCPP_TIMEOUT:-120}
      - MAX_DISCONNECT_RESETS_WITHOUT_PROGRESS=${MAX_DISCONNECT_RESETS_WITHOUT_PROGRESS:-3}
      - MAX_RESUME_GAP_SECONDS=${MAX_RESUME_GAP_SECONDS:-900}
      - RETENTION_DAYS=${RETENTION_DAYS:-90}
      - CLEANUP_INTERVAL_HOURS=${CLEANUP_INTERVAL_HOURS:-24}
      # New Relic
      - NEW_RELIC_MONITOR_MODE=${NEW_RELIC_MONITOR_MODE:-true}
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY:-}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME:-OCPP-Backend-Staging}
      - NEW_RELIC_DISTRIBUTED_TRACING_ENABLED=true
      - NEW_RELIC_APPLICATION_LOGGING_FORWARDING_ENABLED=true
      # Sentry
      - SENTRY_ENABLED=${SENTRY_ENABLED:-true}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=staging
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_PROFILES_SAMPLE_RATE=${SENTRY_PROFILES_SAMPLE_RATE:-0.1}
    volumes:
      - backend_firmware_staging:/app/firmware_files
    # NOTE: `postgres` removed from depends_on as part of the RDS migration.
    # Backend now connects to either Docker postgres or RDS based on DB_HOST
    # in .env.staging; the local Docker postgres service is retained as a
    # rollback target during the 14-day validation window post-cutover.
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - ocpp-network-staging
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN_NAME}
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_APP_URL=https://${DOMAIN_NAME}
        - NEXT_PUBLIC_NEW_RELIC_BROWSER_LICENSE_KEY=${NEXT_PUBLIC_NEW_RELIC_BROWSER_LICENSE_KEY:-}
        - NEXT_PUBLIC_NEW_RELIC_APPLICATION_ID=${NEXT_PUBLIC_NEW_RELIC_APPLICATION_ID:-}
        - NEXT_PUBLIC_NEW_RELIC_ACCOUNT_ID=${NEXT_PUBLIC_NEW_RELIC_ACCOUNT_ID:-}
        - NEXT_PUBLIC_NEW_RELIC_TRUST_KEY=${NEXT_PUBLIC_NEW_RELIC_TRUST_KEY:-}
        - NEXT_PUBLIC_NEW_RELIC_AGENT_ID=${NEXT_PUBLIC_NEW_RELIC_AGENT_ID:-}
        - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
        - NEXT_PUBLIC_SENTRY_ENVIRONMENT=staging
        - SENTRY_ORG=${SENTRY_ORG:-}
        - SENTRY_PROJECT=${SENTRY_PROJECT:-}
        - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN:-}
    container_name: ocpp-frontend-staging
    environment:
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - ocpp-network-staging
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Nginx Reverse Proxy with SSL
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ocpp-nginx-staging
    environment:
      - ENVIRONMENT=staging
      - DOMAIN_NAME=${DOMAIN_NAME}
      - CSP_CLERK_HOSTS=${CSP_CLERK_HOSTS:-https://*.clerk.accounts.dev}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_conf_staging:/etc/letsencrypt
      - certbot_www_staging:/var/www/certbot
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - ocpp-network-staging
    restart: unless-stopped
    logging: *default-logging

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot:latest
    container_name: ocpp-certbot-staging
    volumes:
      - certbot_conf_staging:/etc/letsencrypt
      - certbot_www_staging:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - ocpp-network-staging
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data_staging:
  redis_data_staging:
  backend_firmware_staging:
  certbot_conf_staging:
  certbot_www_staging:

networks:
  ocpp-network-staging:
    driver: bridge
