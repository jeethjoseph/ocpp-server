services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ocpp-postgres
    env_file:
      - ./backend/.env
    environment:
      # Postgres expects these specific var names
      POSTGRES_USER: ${DB_USER:-ocpp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ocpp_password}
      POSTGRES_DB: ${DB_NAME:-ocpp_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocpp_user -d ocpp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ocpp-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ocpp-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ocpp-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ocpp-backend
    env_file:
      - ./backend/.env
    environment:
      # Docker-specific overrides
      - ENVIRONMENT=development
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379
      - NEW_RELIC_MONITOR_MODE=false
      - SENTRY_ENABLED=false
      # Used by Clerk invitation service to build the redirect URL that
      # Clerk's magic-link email points to after sign-up completes.
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      # Razorpay Route (franchisee linked-account payouts) — defaults
      # match staging/prod compose files. Set RAZORPAY_ROUTE_ENABLED=true
      # in backend/.env when testing the settlement flow locally.
      - RAZORPAY_ROUTE_ENABLED=${RAZORPAY_ROUTE_ENABLED:-false}
      - MINIMUM_TRANSFER_AMOUNT=${MINIMUM_TRANSFER_AMOUNT:-1.00}
      - MAX_TRANSFER_RETRIES=${MAX_TRANSFER_RETRIES:-3}
      - FRANCHISEE_PAYOUT_RETRY_INTERVAL_SECONDS=${FRANCHISEE_PAYOUT_RETRY_INTERVAL_SECONDS:-600}
      - RAZORPAY_PLATFORM_FEE_PERCENT=${RAZORPAY_PLATFORM_FEE_PERCENT:-2.0}
    volumes:
      - ./backend:/app
      - backend_firmware:/app/firmware_files
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - ocpp-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: ocpp-frontend
    env_file:
      - ./frontend/.env
    environment:
      # Docker-specific overrides
      - NEXT_PUBLIC_API_URL=http://localhost
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ocpp-network

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ocpp-nginx
    environment:
      - ENVIRONMENT=development
      - DOMAIN_NAME=localhost
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - ocpp-network

volumes:
  postgres_data:
  redis_data:
  backend_firmware:

networks:
  ocpp-network:
    driver: bridge
